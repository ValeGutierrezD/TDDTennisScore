<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Score TDD</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #2c3e50; color: white; }
        .scoreboard { background: #34495e; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; }
        #score-display { font-size: 3rem; margin: 1rem 0; color: #f1c40f; }
        .controls { display: flex; gap: 1rem; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; border: none; border-radius: 5px; transition: 0.3s; }
        .btn-p1 { background-color: #27ae60; color: white; }
        .btn-p2 { background-color: #2980b9; color: white; }
        button:hover { opacity: 0.8; transform: scale(1.05); }
        #reset { margin-top: 1rem; background: #e74c3c; color: white; }
    </style>
</head>
<body>

    <div class="scoreboard">
        <h1>Tennis Score</h1>
        <div id="score-display">Love - Love</div>
        
        <div class="controls">
            <button class="btn-p1" id="p1-btn">Punto Jugador 1</button>
            <button class="btn-p2" id="p2-btn">Punto Jugador 2</button>
        </div>
        
        <button id="reset">Reiniciar Juego</button>
    </div>

    <script type="module" src="./src/presenter.js"></script>
</body>
</html>
